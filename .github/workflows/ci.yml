# PR-side CI for cognic-skill-warehouse-data.
#
# Two lanes (the pack is a pure SKILL.md guidance package — no runtime
# code, no DB, no live substrate lane):
#   - lint-type-unit     ruff lint + format + mypy + the manifest +
#                        SKILL.md consistency suites
#   - authoring-validate the pinned-kernel `agentos validate` build-time
#                        manifest-shape check (placeholder attestations
#                        seeded on the runner; the real cosign/SBOM bundle +
#                        `agentos verify` are release work)
#
# Signing/publishing (`agentos sign --bundle` + `agentos verify`) is RELEASE
# work — it shells out to cosign / syft / grype / pip-licenses — and lives in
# .github/workflows/sign-and-publish.yml, not here.

name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-type-unit:
    name: lint + type + unit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv + Python 3.12
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Check dependency lock
        run: uv lock --check

      - name: Sync dev dependencies
        run: uv sync --frozen --extra dev

      - name: Ruff lint
        run: uv run --extra dev ruff check src tests

      - name: Ruff format check
        run: uv run --extra dev ruff format --check src tests

      - name: Type-check
        run: uv run --extra dev mypy src tests

      - name: Manifest + SKILL.md consistency tests
        run: uv run --extra dev pytest tests/ -q

  authoring-validate:
    name: authoring (agentos validate)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv + Python 3.12
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true

      # The `dev` extra provides the `agentos` authoring/governance CLI used
      # for the build-time check (pinned to the M8 kernel anchor that ships
      # the A7 instruction-mode validator arms).
      - name: Sync dev dependencies (installs the pinned authoring CLI)
        run: uv sync --frozen --extra dev

      # `agentos validate` checks the manifest against the build-time trust
      # gate, which includes that each declared
      # [supply_chain].attestation_paths file exists + is non-empty. The REAL
      # bundle is produced by `agentos sign --bundle .` at release; it shells
      # out to cosign / syft / grype / pip-licenses, absent from this lane. So
      # here we seed throwaway placeholders — this makes the lane a
      # manifest-SHAPE check, NOT a signature/SBOM-content check (that is
      # `agentos verify` at release). Never committed.
      - name: Seed placeholder attestations (manifest-shape check only)
        run: |
          mkdir -p attestations
          printf 'ci-placeholder: cosign signature generated by `agentos sign --bundle` at release\n' > attestations/cosign.sig
          printf '{"bomFormat":"CycloneDX","specVersion":"1.5","version":1}\n' > attestations/sbom.cdx.json

      - name: agentos validate (build-time manifest-shape check)
        run: uv run --extra dev agentos validate .
